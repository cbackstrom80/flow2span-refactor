receivers:
  netflow:
    scheme: netflow
    hostname: 0.0.0.0
    port: 2055
    sockets: 4
    workers: 8
    queue_size: 10000
connectors:
  flow2span:
    window: 30s
    flush_lag: 5s
    max_spans_per_flush: 5000
    max_buckets_in_memory: 240
    environment: ${env:DEPLOYMENT_ENVIRONMENT}
    environment_key: ${env:DEPLOYMENT_ENVIRONMENT_KEY}
    source_address_key: source.address
    destination_address_key: destination.address
    source_port_key: source.port
    destination_port_key: destination.port
    transport_key: network.transport
    bytes_key: flow.io.bytes
    packets_key: flow.io.packets
    start_key: flow.start
    end_key: flow.end
    tcp_flags_key: flow.tcp_flags
    exporter_ip_key: flow.sampler_address
    qos:
      enabled: true
      source_attribute: flow.tos
      fallback_attributes:
      - network.tos
      - ip.tos
      - netflow.tos
      - flow.dscp
      - network.dscp
      - dscp
      derive_dscp_from_tos: true
      emit_on_metrics: true
      emit_on_top_talker_metrics: true
      emit_on_link_qos_metrics: true
      emit_on_traces: true
      focus_classes:
      - voice
      - video
