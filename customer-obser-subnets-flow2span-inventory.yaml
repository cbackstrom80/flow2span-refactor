metadata:
  name: customer-obser-subnets-flow2span-inventory
  description: Flow2Span inventory amended from customer Obser-Subnets.xlsx workbook with three site tabs plus prior wmtcsr01
    route-table context.
  generated_from:
  - Obser-Subnets.xlsx
  - wmtcsr01 show ip route
  notes:
  - Subnets are grouped by site, VLAN, and customer Vlan Name.
  - Transit VLANs are represented as links with placeholder speed_bps values.
  - Exporter IPs for YIS and WAD are placeholders until the customer confirms NetFlow/IPFIX source interfaces.
